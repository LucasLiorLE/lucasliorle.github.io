<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minesweeper Solver</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="retro-window">
        <div class="window-title">
            <span class="title-text">Minesweeper.exe</span>
            <div class="title-buttons">
                <button class="title-btn minimize">_</button>
                <button class="title-btn maximize">□</button>
                <button class="title-btn close">×</button>
            </div>
        </div>
        
        <div class="menu-bar">
            <span class="menu-item">Game</span>
            <span class="menu-item">Help</span>
        </div>
        
        <div class="window-contents">
            <div class="game-panel">
                <div class="top-panel">
                    <div class="mine-counter" id="mineCounter">000</div>
                    <button class="face-button" id="faceBtn">🙂</button>
                    <div class="timer" id="timer">000</div>
                </div>
                
                <div class="settings-panel">
                    <div class="setting-group">
                        <label>Grid Size:</label>
                        <select id="gridSize" class="retro-select">
                            <option value="9">Beginner (9x9)</option>
                            <option value="16">Intermediate (16x16)</option>
                            <option value="30">Expert (30x16)</option>
                            <option value="custom">Custom</option>
                        </select>
                    </div>
                    
                    <div class="custom-size" id="customSize" style="display: none;">
                        <label>Width: <input type="number" id="customWidth" min="5" max="50" value="10" class="retro-input-small"></label>
                        <label>Height: <input type="number" id="customHeight" min="5" max="30" value="10" class="retro-input-small"></label>
                    </div>
                    
                    <div class="setting-group">
                        <label>Mines: <input type="number" id="mineCount" min="1" max="100" value="10" class="retro-input-small"></label>
                    </div>
                    
                    <button class="retro-button" id="newGameBtn">New Game</button>
                </div>
                
                <div class="game-board-container">
                    <div class="game-board" id="gameBoard">
                        <!-- Grid will be generated by JavaScript -->
                    </div>
                </div>
                
                <div class="controls-panel">
                    <div class="mode-selector">
                        <label>
                            <input type="radio" name="mode" value="reveal" checked>
                            Reveal Number
                        </label>
                        <label>
                            <input type="radio" name="mode" value="mine">
                            Mark Mine
                        </label>
                        <label>
                            <input type="radio" name="mode" value="safe">
                            Mark Safe
                        </label>
                    </div>
                    
                    <div class="action-buttons">
                        <button class="retro-button" id="solveBtn">Suggest Move</button>
                        <button class="retro-button" id="clearBtn">Clear Board</button>
                    </div>
                </div>
                
                <div class="hint-panel" id="hintPanel" style="display: none;">
                    <h4>Suggestion:</h4>
                    <p id="hintText"></p>
                </div>
            </div>
        </div>
        
        <div class="window-status-bar">
            <span class="status-text" id="statusText">Click cells to input numbers, right-click to mark mines</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
