<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku Solver</title>
    <link rel="stylesheet" href="../static/css/sudoku.css">
</head>
<body>
    <div class="notebook-page">
        <div class="page-header">
            <h1>Sudoku Solver</h1>
            <button class="close-btn" onclick="window.location.href='../index.html'">✕</button>
        </div>
        
        <div class="instructions">
            <p>Fill in the numbers you know (1-9), then click Solve!</p>
        </div>

        <div class="sudoku-container">
            <div class="sudoku-grid" id="sudokuGrid">
                <!-- Grid will be generated by JavaScript -->
            </div>
        </div>

        <div class="controls">
            <button class="paper-button" id="solveBtn">Solve</button>
            <button class="paper-button" id="clearBtn">Clear All</button>
            <button class="paper-button" id="exampleBtn">Load Example</button>
        </div>

        <div class="solution-info" id="solutionInfo" style="display: none;">
            <h3>Solution Status:</h3>
            <p id="solutionText"></p>
        </div>
    </div>

    <script src="../static/js/sudoku.js"></script>
</body>
</html>
